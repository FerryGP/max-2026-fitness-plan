<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Max · 二六年暑期体测满分计划</title>
    <link rel="stylesheet" href="styles.css?v=20260709-margin-plan">
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <div>
          <p class="eyebrow">小学四年级体测 · 2026 暑期</p>
          <h1>Max · 二六年暑期体测满分计划</h1>
          <p class="hero-copy">今天测试估分约 100 分，四年级中考过程性分已稳；暑期主线是先减重、跳绳留余量、每天拉伸。</p>
        </div>
        <div class="score-board" aria-label="当前体测基线">
          <div>
            <span>体测估分</span>
            <strong>100</strong>
            <em>中考 10/10</em>
          </div>
          <div>
            <span>训练主线</span>
            <strong>减重</strong>
            <em>先控 BMI</em>
          </div>
          <div>
            <span>每日必练</span>
            <strong>跳绳</strong>
            <em>冲 180+</em>
          </div>
          <div>
            <span>仰卧起坐</span>
            <strong>42</strong>
            <em>目标 49+</em>
          </div>
        </div>
      </section>

      <section class="control-bar">
        <label>
          暑期开始
          <input id="startDate" type="date">
        </label>
        <label>
          每天提醒
          <input id="reminderTime" type="time" value="19:30">
        </label>
        <button id="enableNotify" class="primary">开启浏览器提醒</button>
        <button id="downloadCalendar">生成日历提醒</button>
        <button id="resetToday" class="ghost">清空今天</button>
      </section>

      <section class="dashboard">
        <article class="today-panel">
          <div class="section-title">
            <div>
              <p class="eyebrow">今日训练打卡</p>
              <h2 id="todayTitle">加载中</h2>
            </div>
            <div class="status-stack">
              <span id="weekBadge" class="badge">第 1 周</span>
              <span id="todayStatus" class="status">未打卡</span>
            </div>
          </div>
          <div id="checkItems" class="check-list"></div>
          <div class="note-box" id="coachNote"></div>
          <label class="memo-label">
            今日备注
            <textarea id="dailyMemo" rows="4" placeholder="比如：50米跑姿更稳了；天气太热改成游泳。"></textarea>
          </label>
          <button id="saveDay" class="primary wide">保存今日记录</button>
        </article>
      </section>

      <section class="metrics">
        <article>
          <div class="section-title compact">
            <h2>成绩记录</h2>
            <span>每周测一次就够</span>
          </div>
          <form id="metricForm" class="metric-form">
            <input id="metricDate" type="date" aria-label="记录日期">
            <input id="lung" type="number" step="1" min="0" placeholder="肺活量 ml">
            <input id="sprint50" type="number" step="0.01" min="0" placeholder="50米 秒">
            <input id="flex" type="number" step="0.1" placeholder="坐位体前屈 cm">
            <input id="rope" type="number" step="1" min="0" placeholder="跳绳 个/分钟">
            <input id="situps" type="number" step="1" min="0" placeholder="仰卧起坐 个/分钟">
            <input id="height" type="number" step="0.1" min="0" placeholder="身高 cm">
            <input id="weight" type="number" step="0.1" min="0" placeholder="体重 kg">
            <button class="primary" type="submit">保存</button>
          </form>
          <div id="metricHistory" class="history"></div>
        </article>

        <article>
          <div class="section-title compact">
            <h2>暑期进度</h2>
            <span id="progressText">0/56 天</span>
          </div>
          <div class="progress-wrap">
            <div id="progressBar" class="progress-bar"></div>
          </div>
          <div class="target-grid">
            <div><span>第一目标</span><strong>BMI 22.6 内</strong></div>
            <div><span>跳绳目标</span><strong>180+ 留余量</strong></div>
            <div><span>50米顺带目标</span><strong>10.50s 内</strong></div>
            <div><span>仰卧目标</span><strong>49+ 满分线</strong></div>
          </div>
        </article>
      </section>

      <section class="plan-table">
        <div class="section-title compact">
          <h2>每周节奏</h2>
          <span>每天 3-4 件事，照着勾就行</span>
        </div>
        <div id="weeklyPlan" class="week-grid"></div>
      </section>
    </main>

    <template id="workoutTemplate">
      <label class="workout-item">
        <input type="checkbox">
        <span></span>
      </label>
    </template>

    <script src="app.js?v=20260709-margin-plan"></script>
  </body>
</html>
