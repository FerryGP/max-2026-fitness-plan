<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Max · 二六年暑期体测满分计划</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <div>
          <p class="eyebrow">小学体测 · 四升五暑期</p>
          <h1>Max · 二六年暑期体测满分计划</h1>
          <p class="hero-copy">主攻 50 米提速和 BMI 管理，保持跳绳、柔韧、肺活量和核心力量。</p>
        </div>
        <div class="score-board" aria-label="2024 年体测结果">
          <div>
            <span>2024 总分</span>
            <strong>103.6</strong>
            <em>优秀</em>
          </div>
          <div>
            <span>50 米</span>
            <strong>10.10s</strong>
            <em>重点提升</em>
          </div>
          <div>
            <span>BMI</span>
            <strong>18.54</strong>
            <em>超重档</em>
          </div>
        </div>
      </section>

      <section class="control-bar">
        <label>
          暑期开始
          <input id="startDate" type="date">
        </label>
        <label>
          每天提醒
          <input id="reminderTime" type="time" value="19:30">
        </label>
        <button id="enableNotify" class="primary">开启浏览器提醒</button>
        <button id="downloadCalendar">生成日历提醒</button>
        <button id="resetToday" class="ghost">清空今天</button>
      </section>

      <section class="dashboard">
        <article class="today-panel">
          <div class="section-title">
            <div>
              <p class="eyebrow">今日训练</p>
              <h2 id="todayTitle">加载中</h2>
            </div>
            <span id="weekBadge" class="badge">第 1 周</span>
          </div>
          <div id="todayWorkout" class="workout-list"></div>
          <div class="note-box" id="coachNote"></div>
        </article>

        <article class="check-panel">
          <div class="section-title">
            <div>
              <p class="eyebrow">打卡</p>
              <h2>今天完成了吗</h2>
            </div>
            <span id="todayStatus" class="status">未打卡</span>
          </div>
          <div id="checkItems" class="check-list"></div>
          <label class="memo-label">
            今日备注
            <textarea id="dailyMemo" rows="4" placeholder="比如：50米跑姿更稳了；天气太热改成游泳。"></textarea>
          </label>
          <button id="saveDay" class="primary wide">保存今日记录</button>
        </article>
      </section>

      <section class="metrics">
        <article>
          <div class="section-title compact">
            <h2>成绩记录</h2>
            <span>每周测一次就够</span>
          </div>
          <form id="metricForm" class="metric-form">
            <input id="metricDate" type="date" aria-label="记录日期">
            <input id="sprint50" type="number" step="0.01" min="0" placeholder="50米 秒">
            <input id="rope" type="number" step="1" min="0" placeholder="跳绳 个/分钟">
            <input id="situps" type="number" step="1" min="0" placeholder="仰卧起坐 个/分钟">
            <input id="weight" type="number" step="0.1" min="0" placeholder="体重 kg">
            <button class="primary" type="submit">保存</button>
          </form>
          <div id="metricHistory" class="history"></div>
        </article>

        <article>
          <div class="section-title compact">
            <h2>暑期进度</h2>
            <span id="progressText">0/56 天</span>
          </div>
          <div class="progress-wrap">
            <div id="progressBar" class="progress-bar"></div>
          </div>
          <div class="target-grid">
            <div><span>50米目标</span><strong>9.60s 内</strong></div>
            <div><span>跳绳保持</span><strong>150+</strong></div>
            <div><span>仰卧起坐</span><strong>40+</strong></div>
            <div><span>BMI策略</span><strong>控糖控零食</strong></div>
          </div>
        </article>
      </section>

      <section class="plan-table">
        <div class="section-title compact">
          <h2>每周节奏</h2>
          <span>5练2恢复，暑假能坚持才是王道</span>
        </div>
        <div id="weeklyPlan" class="week-grid"></div>
      </section>
    </main>

    <template id="workoutTemplate">
      <label class="workout-item">
        <input type="checkbox">
        <span></span>
      </label>
    </template>

    <script src="app.js"></script>
  </body>
</html>
